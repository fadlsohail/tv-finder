<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>TV Finder</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/styles.css" />
    </head>

<!-- maybe change the background colour to be darker-->
    <body class="bg-neutral-900 text-neutral-100">

        <nav class="bg-neutral-800 border-b border-neutral-700">
            <div class="container mx-auto px-4 py-3 flex items-center justify-between">
                <a class="text-xl font-semibold text-white" href="index.html">TV Finder</a>
    
                <ul class="flex gap-4">
                    <li>
                        <a class="text-neutral-300 hover:text-red-400" href="index.html">Home</a>
                    </li>
                    <li>
                        <a class="text-neutral-300 hover:text-red-400" href="#search">Search</a>
                    </li>
                </ul>
            </div>
        </nav>
    
        <main class="container mx-auto px-4 py-6">
            <h1 class="text-3xl font-bold">TV Finder</h1>
    
            <p class="mt-4 text-neutral-300">
                An app for searching TV shows.
            </p>
            <section id="search" class="mt-6">

                <form id="search-form" class="mt-4">
                    <label for="keywords" class="block mb-2">Enter a show name</label>
            
                    <input
                        type="text"
                        id="keywords"
                        class="border border-neutral-600 bg-neutral-900 text-white rounded px-2 py-1 w-full md:w-1/2"
                        placeholder="Example: Friends">
            
                    <button
                        type="submit"
                        class="bg-red-600 text-white px-4 py-1 rounded mt-2 md:mt-0 hover:bg-red-700">
                        Search
                    </button>
                </form>
            
                <p id="status-message" class="mt-4 text-neutral-300"></p>
            </section>
            
            <section class="mt-6">
                <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </section>
        </main>
    
        <footer class="bg-neutral-800 border-t border-neutral-700 mt-8 py-4">
            <div class="container mx-auto px-4">
                <p class="text-neutral-300">TV Finder - Introduction to Web Design</p>
            </div>
        </footer>
    
        <script src="./js/app.js"></script>
    </body>
</html>
