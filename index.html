<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>The Show Finder</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link rel="stylesheet" href="./css/styles.css" />
    </head>

    <body class="bg-neutral-900 text-neutral-100 min-h-screen flex flex-col">

        <nav class="bg-neutral-800 border-b border-neutral-700 sticky top-0 z-10">
            <div class="container mx-auto px-4 py-3 flex items-center justify-between">
                <a class="text-xl font-semibold text-white" href="index.html">The Show Finder</a>
    
                <ul class="flex gap-4">
                    <li>
                        <a class="text-neutral-300 hover:text-red-400" href="index.html">Home</a>
                    </li>
                    <li>
                        <a class="text-neutral-300 hover:text-red-400" href="#search">Search</a>
                    </li>
                </ul>
            </div>
        </nav>
    
        <main class="container mx-auto px-4 py-6 text-center flex-grow flex flex-col justify-center">
            <h1 class="text-3xl font-bold">The Show Finder</h1>
    
            <p class="mt-4 text-neutral-300">
                The app for searching TV shows
            </p>
            <section id="search" class="mt-6">

                <form id="search-form" class="mt-4 max-w-2xl mx-auto">
                    <label for="keywords" class="block mb-2 text-neutral-300">Enter a show name below</label>

                    <div class="relative max-w-2xl mx-auto">
                        <input
                            type="text"
                            id="keywords"
                            class="border border-neutral-600 bg-neutral-900 text-white rounded-full px-5 py-3 pr-32 w-full"
                            placeholder="Search Dragon Ball Z...">
                    
                        <button
                            type="submit"
                            class="absolute right-1 top-1 bottom-1 bg-red-600 text-white px-8 rounded-full hover:bg-red-700">
                            Search
                        </button>
                    </div>
                </form>
            
                <p id="status-message" class="mt-4 text-neutral-300"></p>
            </section>
            
            <section class="mt-6">
                <div id="results" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </section>
        </main>
    
        <footer class="bg-neutral-800 border-t border-neutral-700 mt-8 py-4">
            <div class="container mx-auto px-4">
                <p class="text-neutral-300 text-center">The Show Finder - Search for your favourite TV shows</p>
            </div>
        </footer>
    
        <script src="./js/app.js"></script>
    </body>
</html>
